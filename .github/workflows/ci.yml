name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests + Análisis de Seguridad
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Arquitectura

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ejecutar tests básicos (verificar que la aplicación se puede importar)
      - name: Verificar importación de la aplicación
        run: |
          python -c "from app import app; print('Aplicación importada correctamente')"

      # 5. Análisis SAST con Bandit
      - name: 🔒 Análisis de seguridad (Bandit)
        run: |
          pip install bandit
          # -ll = reportar solo severidad MEDIA y ALTA
          # -ii = reportar solo confianza MEDIA y ALTA
          bandit -r . -ll -ii --exclude ./tests,./venv,./.git

  deploy-dev:
    name: Deploy a Desarrollo
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Deploy a Dev (Render)
        run: |
          curl -X POST ${{ secrets.RENDER_DEV_HOOK }}
          echo "Deploy a Dev disparado"

      - name: ⏳ Esperar que Render inicie
        run: sleep 30

  smoke-test:
    name: Smoke Test en Dev
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: 🩺 Verificar que Dev responde
        run: |
          # Intentar 5 veces con 10 segundos entre intento
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://miapp-dev.onrender.com/health 2>/dev/null || echo "000")
            if [[ $STATUS -eq 200 ]]; then
              echo "✅ Dev responde correctamente (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i fallido (HTTP $STATUS), reintentando..."
            sleep 10
          done
          echo "❌ Dev no responde después de 5 intentos"
          exit 1

  deploy-prod:
    name: Deploy a Producción
    needs: smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy a Prod (Render)
        run: |
          curl -X POST ${{ secrets.RENDER_PROD_HOOK }}
          echo "✅ Deploy a Producción disparado"
